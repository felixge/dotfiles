# Enable extended keys (CSI u / modified keys) so apps get full key info
set -g extended-keys on
set -g extended-keys-format csi-u

# Allow kitty escape sequences to pass through (needed for kitten clipboard, etc.)
set -g allow-passthrough on
set -g update-environment "KITTY_PUBLIC_KEY KITTY_WINDOW_ID"

# Start window numbering from 1
set -g base-index 1
set -g pane-base-index 1

# Renumber windows sequentially when one is closed
set -g renumber-windows on

# Enable mouse mode
set -g mouse on

# Enable focus events so Neovim gets FocusLost/FocusGained inside tmux
set -g focus-events on

# Set scroll speed to 1 line per wheel event
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Switch to previous/next window with Cmd+Left/Right (kitty sends these)
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

# Swap window position with Cmd+Shift+Left/Right (kitty sends Alt+Shift)
bind-key -n M-S-Left swap-window -d -t -1
bind-key -n M-S-Right swap-window -d -t +1

# Status bar — light theme
set -g status-style 'bg=#e4e4e4,fg=#6c6c6c'
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '
set -g window-status-current-style 'bg=#5f87af,fg=#ffffff,bold'
set -g window-status-style 'bg=#e4e4e4,fg=#8a8a8a'
set -g status-left-length 30
set -g status-left '#[bg=#8787af,fg=#ffffff,bold] #S #[default] '
set -g status-right '#[fg=#8a8a8a] %b %d  %H:%M '

# Set terminal title to session name
set -g set-titles on
set -g set-titles-string '#h: #S'

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#bcbcbc'
set -g pane-active-border-style 'fg=#5f87af'
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=#5f87af]●,#[fg=#bcbcbc]○} #P: #{pane_current_command} '


# Open scrollback in nvim
bind-key v capture-pane -S -32768 \; save-buffer /tmp/tmux-scrollback.txt \; delete-buffer \; new-window "nvim + /tmp/tmux-scrollback.txt"

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Session picker with fzf
bind s display-popup -E "tmux list-sessions -F '#{?session_attached,,#{session_last_attached} #{session_name}}' | sed '/^$/d' | sort -rn | awk '{print \$2}' | fzf --reverse | xargs tmux switch-client -t"
