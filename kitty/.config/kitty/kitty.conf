#startup_session ~/.config/kitty/startup.conf
# see kitty list-fonts and brew install --cask 'font-sauce-code-pro-nerd-font'
font_family      SauceCodePro Nerd Font Mono Regular
bold_font        SauceCodePro Nerd Font Mono Bold
italic_font      SauceCodePro Nerd Font Mono Italic
bold_italic_font SauceCodePro Nerd Font Mono Semibold Italic
font_size 18.0
adjust_line_height  95%
adjust_column_width 95%
tab_bar_edge top
enabled_layouts fat:bias=80,tall:bias=70;full_size=1, stack
foreground #000000
background #ffffff
cursor #000000
cursor_shape block
shell_integration no-cursor
editor /opt/homebrew/bin/nvim
foreground #000000
sync_to_monitor no
allow_remote_control yes
clipboard_control write-clipboard write-primary read-clipboard read-primary
macos_option_as_alt yes

# Dead key sequences for umlauts (Option+U followed by vowel)
map alt+u>a send_text all ä
map alt+u>shift+a send_text all Ä
map alt+u>o send_text all ö
map alt+u>shift+o send_text all Ö
map alt+u>u send_text all ü
map alt+u>shift+u send_text all Ü
map alt+u>e send_text all ë
map alt+u>shift+e send_text all Ë
map alt+u>i send_text all ï
map alt+u>shift+i send_text all Ï
map alt+u>s send_text all ß

# send up arrow + enter to second window in current tab
map ctrl+enter combine : second_window : send_text all \x1b\x5b\x41\n : previous_window

map cmd+t           new_tab_with_cwd
map cmd+shift+t     new_tab
map cmd+d new_window_with_cwd
map cmd+w close_window
map shift+cmd+[        previous_tab
map shift+cmd+]        next_tab
map alt+cmd+left       move_tab_backward
map alt+cmd+right      move_tab_forward
map cmd+alt+down send_text all \x1b[1;5B
map cmd+alt+up send_text all \x1b[1;5A
map cmd+left      send_key alt+left
map cmd+right     send_key alt+right
map cmd+shift+left  send_text all \x1b[1;4D
map cmd+shift+right send_text all \x1b[1;4C
map cmd+enter    toggle_fullscreen
map cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map shift+enter send_text all \x1b[13;2u
map ctrl+shift+s send_text all \x1b[115;6u
map cmd+shift+enter kitten zoom.py
# try clear_terminal scrollback active
map cmd+k combine : clear_terminal clear active : send_text normal,application \x0c

tab_bar_style powerline
active_tab_foreground   #fff
active_tab_background   #0087D7
active_tab_font_style   bold
inactive_tab_foreground #000
inactive_tab_background #BFE1F5

macos_traditional_fullscreen yes
inactive_text_alpha 0.5
